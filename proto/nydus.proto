syntax = "proto3";

package nydus;

option go_package = "github.com/openzerg/nydus/gen/nydus/v1;nydusv1";

service NydusService {
  // ==================== Event System ====================
  
  rpc PublishEvent(PublishEventRequest) returns (PublishEventResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc Unsubscribe(UnsubscribeRequest) returns (Empty);
  rpc ListSubscribers(ListSubscribersRequest) returns (ListSubscribersResponse);
  rpc GetEventHistory(GetEventHistoryRequest) returns (GetEventHistoryResponse);

  // ==================== Chatroom ====================
  
  rpc CreateChatroom(CreateChatroomRequest) returns (Chatroom);
  rpc GetChatroom(GetChatroomRequest) returns (Chatroom);
  rpc UpdateChatroom(UpdateChatroomRequest) returns (Chatroom);
  rpc DeleteChatroom(DeleteChatroomRequest) returns (Empty);
  rpc ListChatrooms(ListChatroomsRequest) returns (ListChatroomsResponse);

  // ==================== Member ====================
  
  rpc AddMember(AddMemberRequest) returns (Member);
  rpc RemoveMember(RemoveMemberRequest) returns (Empty);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (Member);

  // ==================== Message ====================
  
  rpc SendMessage(SendMessageRequest) returns (Message);
  rpc GetMessageHistory(GetMessageHistoryRequest) returns (GetMessageHistoryResponse);
  rpc SubscribeMessages(SubscribeMessagesRequest) returns (stream Message);

  // ==================== Session ====================
  
  rpc GetChatroomSessions(GetChatroomSessionsRequest) returns (GetChatroomSessionsResponse);
}

// ==================== Common ====================

message Empty {}

// ==================== Event System ====================

message PublishEventRequest {
  string event_type = 1;
  string source_instance_id = 2;
  map<string, string> data = 3;
}

message PublishEventResponse {
  string event_id = 1;
  int64 timestamp = 2;
}

message SubscribeRequest {
  string instance_id = 1;
  repeated string event_types = 2;
}

message Event {
  string event_id = 1;
  string event_type = 2;
  string source_instance_id = 3;
  int64 timestamp = 4;
  map<string, string> data = 5;
}

message UnsubscribeRequest {
  string instance_id = 1;
}

message ListSubscribersRequest {
  optional string event_type = 1;
}

message ListSubscribersResponse {
  repeated Subscriber subscribers = 1;
}

message Subscriber {
  string instance_id = 1;
  string ip = 2;
  repeated string event_types = 3;
  int64 subscribed_at = 4;
}

message GetEventHistoryRequest {
  optional string instance_id = 1;
  optional string event_type = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  int32 limit = 5;
}

message GetEventHistoryResponse {
  repeated Event events = 1;
}

// ==================== Chatroom ====================

message Chatroom {
  string id = 1;
  string name = 2;
  string created_by = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message CreateChatroomRequest {
  string name = 1;
  string created_by = 2;
  repeated MemberInit members = 3;
}

message MemberInit {
  string member_id = 1;
  string member_type = 2;  // "user" or "instance"
  string role = 3;
}

message GetChatroomRequest {
  string chatroom_id = 1;
}

message UpdateChatroomRequest {
  string chatroom_id = 1;
  optional string name = 2;
}

message DeleteChatroomRequest {
  string chatroom_id = 1;
}

message ListChatroomsRequest {
  optional string member_id = 1;  // filter by member
  optional string member_type = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListChatroomsResponse {
  repeated Chatroom chatrooms = 1;
  int32 total = 2;
}

// ==================== Member ====================

message Member {
  string id = 1;
  string chatroom_id = 2;
  string member_id = 3;
  string member_type = 4;  // "user" or "instance"
  string role = 5;
  int64 joined_at = 6;
}

message AddMemberRequest {
  string chatroom_id = 1;
  string member_id = 2;
  string member_type = 3;
  string role = 4;
}

message RemoveMemberRequest {
  string chatroom_id = 1;
  string member_id = 2;
}

message ListMembersRequest {
  string chatroom_id = 1;
}

message ListMembersResponse {
  repeated Member members = 1;
}

message UpdateMemberRoleRequest {
  string chatroom_id = 1;
  string member_id = 2;
  string role = 3;
}

// ==================== Message ====================

message Message {
  string id = 1;
  string chatroom_id = 2;
  string sender_id = 3;
  string sender_type = 4;  // "user" or "instance"
  string content = 5;
  optional string reply_to = 6;
  int64 created_at = 7;
}

message SendMessageRequest {
  string chatroom_id = 1;
  string sender_id = 2;
  string sender_type = 3;
  string content = 4;
  optional string reply_to = 5;
}

message GetMessageHistoryRequest {
  string chatroom_id = 1;
  optional string before_id = 2;  // for pagination
  int32 limit = 3;
}

message GetMessageHistoryResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}

message SubscribeMessagesRequest {
  string chatroom_id = 1;
  string instance_id = 2;
}

// ==================== Session ====================

message ChatroomSession {
  string chatroom_id = 1;
  string instance_id = 2;
  string session_id = 3;
  string external_id = 4;  // equals chatroom_id
}

message GetChatroomSessionsRequest {
  string chatroom_id = 1;
}

message GetChatroomSessionsResponse {
  repeated ChatroomSession sessions = 1;
}